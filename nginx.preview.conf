server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # dev server proxy 直接讀 JSON
    location = /predictions.json {
        try_files $uri =404;
    }

    # 與 GitHub Pages 相同子路徑，方便本地預覽
    location = / {
        return 302 /taiwan-lottery-page/;
    }

    location /taiwan-lottery-page/ {
        rewrite ^/taiwan-lottery-page/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }
}
