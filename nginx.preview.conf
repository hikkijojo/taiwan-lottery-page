server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    absolute_redirect off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Vite dev server proxy 直接讀 JSON
    location = /predictions.json {
        try_files $uri =404;
    }

    # 根路徑導向 GitHub Pages 相同子路徑
    location = / {
        return 302 /taiwan-lottery-page/;
    }

    location = /taiwan-lottery-page {
        return 301 /taiwan-lottery-page/;
    }

    # 與 GitHub Pages 相同子路徑，方便本地預覽
    location /taiwan-lottery-page/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /taiwan-lottery-page/index.html;
    }
}
